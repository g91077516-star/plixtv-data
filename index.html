<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlixTV</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#E50914;--red2:#b20710;--bg:#080808;--bg3:#1a1a1a;--muted:#999;--muted2:#555;--fd:'Bebas Neue',sans-serif;--fb:'Outfit',sans-serif;}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:#fff;font-family:var(--fb);overflow-x:hidden}

    /* NAV */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(8,8,8,.97);border-bottom:1px solid rgba(255,255,255,.05)}
    .nav-left{display:flex;align-items:center;gap:20px}
    .logo{font-family:var(--fd);font-size:26px;color:var(--red);letter-spacing:3px;cursor:pointer;user-select:none}
    .filter-bar{display:flex;gap:4px}
    .fbtn{background:none;border:1px solid rgba(255,255,255,.15);color:var(--muted);font-family:var(--fb);font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all .2s}
    .fbtn:hover{border-color:rgba(255,255,255,.4);color:#fff}
    .fbtn.active{background:#fff;color:#000;border-color:#fff;font-weight:500}
    .nav-right{display:flex;align-items:center;gap:14px}
    .search-wrap{position:relative}
    .search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 14px}
    .search-box input{background:none;border:none;outline:none;color:#fff;font-family:var(--fb);font-size:13px;width:200px}
    .search-box input::placeholder{color:var(--muted2)}
    .search-preview{display:none;position:absolute;top:calc(100% + 8px);right:0;width:320px;background:#1a1a1a;border:1px solid rgba(255,255,255,.12);border-radius:10px;overflow:hidden;z-index:300}
    .search-preview.visible{display:block}
    .preview-item{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .15s}
    .preview-item:hover{background:rgba(255,255,255,.07)}
    .preview-item img{width:36px;height:54px;object-fit:cover;border-radius:4px;flex-shrink:0}
    .preview-item-info{flex:1;min-width:0}
    .preview-item-title{font-size:13px;font-weight:500;color:#e0e0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .preview-item-sub{font-size:11px;color:#666;margin-top:2px}
    .preview-item-rating{font-size:11px;color:#ffd700;flex-shrink:0}
    .preview-empty{padding:16px;text-align:center;color:#555;font-size:13px}
    .preview-header{padding:8px 12px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.06)}
    #menu-btn{display:none;width:32px;height:32px;background:var(--red);border-radius:6px;align-items:center;justify-content:center;cursor:pointer;border:none}

    /* MENÚ MÓVIL */
    .menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400}
    .menu-overlay.open{display:block}
    .menu-panel{position:fixed;top:0;right:0;bottom:0;width:240px;background:#111;z-index:401;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;padding:20px 0}
    .menu-panel.open{transform:translateX(0)}
    .menu-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
    .menu-logo{font-family:var(--fd);font-size:22px;color:var(--red);letter-spacing:3px;padding:0 24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
    .menu-item{display:flex;align-items:center;gap:12px;padding:14px 24px;color:#ccc;font-size:15px;cursor:pointer;transition:all .2s;border:none;background:none;font-family:var(--fb);width:100%;text-align:left}
    .menu-item:hover{background:rgba(255,255,255,.06);color:#fff}
    .menu-item.active{color:#fff;font-weight:500}
    .menu-item svg{width:18px;height:18px;flex-shrink:0}

    /* HERO */
    .hero{position:relative;height:90vh;display:flex;align-items:flex-end;padding-bottom:5rem;margin-top:57px}
    .hero-bg{position:absolute;inset:0}
    .hero-bg img{width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:brightness(.45)}
    .hero-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(8,8,8,.92) 38%,transparent),linear-gradient(to top,rgba(8,8,8,1) 0%,transparent 50%)}
    .hero-content{position:relative;z-index:2;padding:0 3rem;max-width:560px}
    .hero-pill{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:3px 12px;border-radius:4px;margin-bottom:12px}
    .hero-title{font-family:var(--fd);font-size:clamp(3rem,6vw,5.5rem);line-height:1;letter-spacing:1px;margin-bottom:10px}
    .hero-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .hero-match{color:#46d369;font-size:13px;font-weight:500}
    .hero-badge{border:1px solid #aaa;color:#ccc;font-size:10px;padding:2px 7px;border-radius:3px}
    .hero-dur{color:var(--muted);font-size:13px}
    .hero-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,.75);margin-bottom:1.5rem}
    .hero-btns{display:flex;gap:10px}

    /* BUTTONS */
    .btn-red{background:var(--red);color:#fff;border:none;padding:10px 24px;border-radius:6px;font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .2s}
    .btn-red:hover{background:var(--red2)}
    .btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);padding:10px 22px;border-radius:6px;font-family:var(--fb);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .2s}
    .btn-ghost:hover{background:rgba(255,255,255,.22)}
    .btn-lista{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);padding:10px 18px;border-radius:6px;font-family:var(--fb);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
    .btn-lista:hover{background:rgba(255,255,255,.2)}
    .btn-lista.en-lista{background:rgba(229,9,20,.15);border-color:var(--red);color:var(--red)}

    /* CATALOG */
    .categories{padding:0 2rem 5rem}
    .cat-section{margin-bottom:2.5rem}
    .cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 4px}
    .cat-title{font-size:16px;font-weight:500;color:#ddd;margin:0}
    .cat-arrows{display:flex;gap:6px}
    .cat-arrow{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .cat-arrow:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4)}
    .cat-arrow svg{width:12px;height:12px}
    .movies-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
    .movies-grid::-webkit-scrollbar{height:4px}
    .movies-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
    .movies-grid .card{flex:0 0 150px;min-width:150px}

    /* CARD */
    .card{border-radius:8px;overflow:hidden;background:var(--bg3);cursor:pointer;transition:transform .25s,box-shadow .25s}
    .card:hover{transform:scale(1.05);box-shadow:0 16px 50px rgba(0,0,0,.7);position:relative;z-index:2}
    .card-img-wrap{position:relative;aspect-ratio:2/3;overflow:hidden}
    .card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
    .card:hover .card-img-wrap img{transform:scale(1.06)}
    .card-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
    .card:hover .card-overlay{opacity:1}
    .play-circle{width:40px;height:40px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center}
    .card-star{color:#ffd700;font-size:12px;font-weight:500}
    .type-pill{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.2);color:#ddd;font-size:9px;font-weight:600;letter-spacing:.5px;padding:2px 8px;border-radius:10px;text-transform:uppercase}
    .card-info{padding:9px 10px 11px}
    .card-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e0e0e0}
    .card-sub{font-size:10px;color:var(--muted2);margin-top:3px}

    /* LOADING */
    .loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;gap:10px}
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* DETAIL */
    .detail-view{display:none;flex-direction:column}
    .detail-hero{position:relative;height:400px;overflow:hidden}
    .detail-hero img{width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:brightness(.4)}
    .detail-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(8,8,8,.4) 50%,transparent)}
    .back-btn{position:absolute;top:80px;left:24px;display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);color:#ddd;font-family:var(--fb);font-size:13px;padding:7px 16px;border-radius:7px;cursor:pointer;transition:background .2s}
    .back-btn:hover{background:rgba(0,0,0,.8);color:#fff}
    .detail-hero-text{position:absolute;bottom:28px;left:28px;right:28px}
    .type-pill-lg{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 12px;border-radius:4px;margin-bottom:10px}
    .detail-title{font-family:var(--fd);font-size:clamp(2.5rem,5vw,4.5rem);line-height:1;letter-spacing:1px;margin-bottom:10px}
    .detail-badges{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .match-text{color:#46d369;font-size:13px;font-weight:500}
    .bdg{border:1px solid #999;color:#ccc;font-size:10px;padding:2px 7px;border-radius:3px}
    .bdg-txt{color:var(--muted);font-size:13px}
    .detail-body{padding:0 28px 50px}
    .player-wrap{display:none;margin-bottom:24px;border-radius:10px;overflow:hidden;position:relative;background:#000}
    .player-wrap iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
    .player-close{position:absolute;top:12px;left:14px;z-index:10;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:var(--fb);font-size:12px;padding:6px 16px;border-radius:6px;cursor:pointer}
    .player-close:hover{background:rgba(0,0,0,.9)}
    .detail-main{display:grid;grid-template-columns:1fr 260px;gap:32px;padding-top:8px;margin-bottom:32px}
    .detail-actions{display:flex;gap:10px;margin-bottom:16px}
    .detail-desc{font-size:14px;line-height:1.75;color:rgba(255,255,255,.75)}
    .rating-block{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .rating-num{font-size:26px;font-weight:500;color:#ffd700}
    .rating-stars{color:#ffd700;font-size:13px;letter-spacing:1px}
    .rating-label{font-size:11px;color:var(--muted)}
    .meta-item{display:flex;gap:6px;margin-bottom:10px;font-size:13px;align-items:flex-start}
    .meta-label{color:var(--muted2);min-width:70px;flex-shrink:0}
    .meta-val{color:#ccc}
    .tags-wrap{display:flex;flex-wrap:wrap;gap:5px}
    .meta-tag{display:inline-block;background:var(--bg3);border:1px solid #2a2a2a;color:#bbb;font-size:11px;padding:2px 10px;border-radius:5px}
    .similar-title{font-size:16px;font-weight:500;color:#ddd;margin-bottom:14px}
    .similar-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
    .similar-grid::-webkit-scrollbar{height:4px}
    .similar-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
    .similar-grid .sim-card{flex:0 0 130px;min-width:130px}
    .sim-card{border-radius:7px;overflow:hidden;cursor:pointer;background:var(--bg3);transition:transform .2s}
    .sim-card:hover{transform:scale(1.04)}
    .sim-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
    .sim-info{padding:7px 8px}
    .sim-title{font-size:11px;font-weight:500;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sim-sub{font-size:10px;color:var(--muted2);margin-top:2px}

    /* EPISODIOS */
    .eps-section{margin-bottom:20px}
    .eps-title{font-size:15px;font-weight:500;color:#ddd;margin-bottom:12px}
    .temp-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
    .temp-tab{background:none;border:1px solid rgba(255,255,255,.15);color:#888;font-family:var(--fb);font-size:12px;padding:6px 16px;border-radius:20px;cursor:pointer;transition:all .2s}
    .temp-tab:hover{border-color:rgba(255,255,255,.3);color:#fff}
    .temp-tab.active{background:#fff;color:#000;border-color:#fff;font-weight:500}
    .ep-item{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .15s;border:1px solid transparent;margin-bottom:4px}
    .ep-item:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
    .ep-num{width:32px;height:32px;border-radius:50%;border:1.5px solid #444;display:flex;align-items:center;justify-content:center;font-size:12px;color:#888;flex-shrink:0}
    .ep-info{flex:1}
    .ep-titulo{font-size:13px;font-weight:500;color:#e0e0e0}
    .ep-sub{font-size:11px;color:#555;margin-top:2px}
    .ep-play{width:28px;height:28px;border-radius:50%;border:1.5px solid #444;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .2s}
    .ep-item:hover .ep-play{border-color:var(--red)}
    .ep-item.playing{background:rgba(229,9,20,.08);border-color:rgba(229,9,20,.3)}
    .ep-item.playing .ep-num{border-color:var(--red);color:var(--red)}
    .ep-item.playing .ep-titulo{color:#fff}

    @media(max-width:640px){
      #menu-btn{display:flex}
      .filter-bar{display:none}
      .navbar{padding:12px 16px}
      .search-box input{width:110px}
      .hero-content{padding:0 1.2rem}
      .categories{padding:0 1rem 4rem}
      .detail-main{grid-template-columns:1fr}
      .detail-body{padding:0 16px 40px}
      .back-btn{top:70px;left:14px}
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <span class="logo" id="logo-btn">PLIXTV</span>
    <div class="filter-bar">
      <button class="fbtn active" data-filter="all">Todo</button>
      <button class="fbtn" data-filter="Película">Películas</button>
      <button class="fbtn" data-filter="Serie">Series</button>
      <button class="fbtn" data-filter="mi-lista">Mi lista</button>
      <button class="fbtn" data-filter="continuar">Continuar viendo</button>
    </div>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <input id="search-input" type="text" placeholder="Buscar título, actor, género..."/>
      </div>
      <div class="search-preview" id="search-preview">
        <div class="preview-header">Resultados</div>
        <div id="preview-list"></div>
      </div>
    </div>
    <button id="menu-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>

<!-- MENÚ MÓVIL -->
<div class="menu-overlay" id="menu-overlay"></div>
<div class="menu-panel" id="menu-panel">
  <button class="menu-close" id="menu-close">✕</button>
  <div class="menu-logo">PLIXTV</div>
  <button class="menu-item active" data-filter="all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Inicio</button>
  <button class="menu-item" data-filter="Película"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 2v20M17 2v20M2 12h20"/></svg>Películas</button>
  <button class="menu-item" data-filter="Serie"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Series</button>
  <button class="menu-item" data-filter="mi-lista"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>Mi lista</button>
  <button class="menu-item" data-filter="continuar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Continuar viendo</button>
</div>

<!-- CATÁLOGO -->
<div id="catalog-view">
  <section class="hero">
    <div class="hero-bg">
      <img src="" alt="hero" id="hero-img"/>
      <div class="hero-grad"></div>
    </div>
    <div class="hero-content">
      <span class="hero-pill">Destacada</span>
      <h1 class="hero-title" id="hero-title"></h1>
      <div class="hero-meta">
        <span class="hero-match" id="hero-match"></span>
        <span class="hero-badge" id="hero-badge"></span>
        <span class="hero-dur" id="hero-dur"></span>
      </div>
      <p class="hero-desc" id="hero-desc"></p>
      <div class="hero-btns">
        <button class="btn-red" id="hero-info-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Más info
        </button>
        <button class="btn-ghost" id="hero-lista-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          Mi lista
        </button>
      </div>
    </div>
  </section>
  <main id="categories" class="categories">
    <div class="loading"><div class="spinner"></div> Cargando catálogo...</div>
  </main>
</div>

<!-- DETALLE -->
<div id="detail-view" class="detail-view">
  <div class="detail-hero">
    <img id="d-backdrop" src="" alt=""/>
    <div class="detail-grad"></div>
    <button class="back-btn" id="back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </button>
    <div class="detail-hero-text">
      <span class="type-pill-lg" id="d-type"></span>
      <h1 class="detail-title" id="d-title"></h1>
      <div class="detail-badges">
        <span class="match-text" id="d-match"></span>
        <span class="bdg" id="d-age"></span>
        <span class="bdg-txt" id="d-year"></span>
        <span class="bdg-txt" id="d-dur"></span>
        <span class="bdg">HD</span>
      </div>
    </div>
  </div>

  <div class="detail-body">
    <div class="player-wrap" id="player-wrap">
      <button class="player-close" id="player-close-btn">✕ Cerrar reproductor</button>
      <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="detail-main">
      <div>
        <div class="detail-actions">
          <button class="btn-red" id="btn-play-detail">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            Reproducir
          </button>
          <button class="btn-lista" id="btn-mi-lista">
            <span id="lista-icon">+</span> Mi lista
          </button>
        </div>
        <!-- EPISODIOS debajo de los botones -->
        <div class="eps-section" id="eps-section" style="display:none">
          <p class="eps-title">Episodios</p>
          <div id="eps-list"></div>
        </div>
        <p class="detail-desc" id="d-desc"></p>
      </div>
      <div>
        <div class="rating-block">
          <span class="rating-num" id="d-rating"></span>
          <div>

// ── HELPERS ───────────────────────────────────────────────────
function getFiltered() {
  return currentFilter === "all" ? movies : movies.filter(m => m.type === currentFilter);
}

function groupByGenre(list) {
  const map = new Map();
  map.set("Todos", list);
  list.forEach(m => m.genres.forEach(g => {
    if (!map.has(g)) map.set(g, []);
    map.get(g).push(m);
  }));
  const result = [];
  map.forEach((ms, name) => { if (ms.length > 0) result.push({ name, movies: ms }); });
  return result;
}

function stars(r) {
  const f = Math.round(r / 2);
  return "★".repeat(f) + "☆".repeat(5 - f);
}

// ── MI LISTA & CONTINUAR ──────────────────────────────────────
function getMiLista() { return JSON.parse(localStorage.getItem("plixtv_lista") || "[]"); }
function setMiLista(ids) { localStorage.setItem("plixtv_lista", JSON.stringify(ids)); }
function getContinuar() { return JSON.parse(localStorage.getItem("plixtv_continuar") || "{}"); }
function setContinuar(d) { localStorage.setItem("plixtv_continuar", JSON.stringify(d)); }
function estaEnLista(id) { return getMiLista().includes(id); }

function toggleLista(movie) {
  let lista = getMiLista();
  lista = lista.includes(movie.id) ? lista.filter(i => i !== movie.id) : [...lista, movie.id];
  setMiLista(lista);
  actualizarBtnLista(movie.id);
}

function actualizarBtnLista(id) {
  const btn = document.getElementById("btn-mi-lista");
  const icon = document.getElementById("lista-icon");
  if (!btn) return;
  if (estaEnLista(id)) { btn.classList.add("en-lista"); icon.textContent = "✓"; }
  else { btn.classList.remove("en-lista"); icon.textContent = "+"; }
}

function marcarContinuar(movie) {
  const d = getContinuar();
  d[movie.id] = { id: movie.id, timestamp: Date.now() };
  setContinuar(d);
}

// ── CARDS ─────────────────────────────────────────────────────
function createCard(movie) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-img-wrap">
      <img src="${movie.poster}" alt="${movie.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/111/444?text=?'"/>
      <div class="card-overlay">
        <div class="play-circle"><svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M8 5v14l11-7z"/></svg></div>
        <span class="card-star">★ ${movie.rating}</span>
      </div>
      <span class="type-pill">${movie.type}</span>
    </div>
    <div class="card-info">
      <p class="card-name">${movie.title}</p>
      <p class="card-sub">${movie.year} · ${movie.genres[0]}</p>
    </div>`;
  card.addEventListener("click", () => {
    window.open(window.location.pathname + "?id=" + movie.id, "_blank");
  });
  return card;
}

function createSimCard(movie) {
  const card = document.createElement("div");
  card.className = "sim-card";
  card.innerHTML = `
    <img src="${movie.poster}" alt="${movie.title}" loading="lazy"/>
    <div class="sim-info">
      <p class="sim-title">${movie.title}</p>
      <p class="sim-sub">${movie.year} · ${movie.genres[0]}</p>
    </div>`;
  card.addEventListener("click", () => {
    window.open(window.location.pathname + "?id=" + movie.id, "_blank");
  });
  return card;
}

// ── CATALOG ───────────────────────────────────────────────────
function makeSection(title, moviesList) {
  const section = document.createElement("section");
  section.className = "cat-section";
  const grid = document.createElement("div");
  grid.className = "movies-grid";
  moviesList.forEach(m => grid.appendChild(createCard(m)));
  const header = document.createElement("div");
  header.className = "cat-header";
  header.innerHTML = `
    <h2 class="cat-title">${title}</h2>
    <div class="cat-arrows">
      <button class="cat-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="cat-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>`;
  const [prev, next] = header.querySelectorAll(".cat-arrow");
  prev.addEventListener("click", () => grid.scrollBy({ left: -500, behavior: "smooth" }));
  next.addEventListener("click", () => grid.scrollBy({ left: 500, behavior: "smooth" }));
  section.appendChild(header);
  section.appendChild(grid);
  return section;
}

function renderCatalog() {
  const container = document.getElementById("categories");
  container.innerHTML = "";
  if (currentFilter === "mi-lista") {
    const lista = getMiLista();
    const listMovies = movies.filter(m => lista.includes(m.id));
    const section = makeSection("Mi lista", listMovies);
    if (!listMovies.length) section.querySelector(".movies-grid").innerHTML = `<p style="color:#555;padding:1rem 0;font-size:14px">Tu lista está vacía.</p>`;
    container.appendChild(section); return;
  }
  if (currentFilter === "continuar") {
    const cont = getContinuar();
    const contMovies = Object.values(cont).sort((a,b) => b.timestamp-a.timestamp).map(c => movies.find(m => m.id===c.id)).filter(Boolean);
    const section = makeSection("Continuar viendo", contMovies);
    if (!contMovies.length) section.querySelector(".movies-grid").innerHTML = `<p style="color:#555;padding:1rem 0;font-size:14px">Todavía no empezaste a ver nada.</p>`;
    container.appendChild(section); return;
  }
  groupByGenre(getFiltered()).forEach(group => {
    if (!group.movies.length) return;
    container.appendChild(makeSection(group.name, group.movies));
  });
}

// ── DETAIL ────────────────────────────────────────────────────
function openDetail(movie) {
  currentMovie = movie;
  document.getElementById("catalog-view").style.display = "none";
  document.getElementById("detail-view").style.display = "flex";
  document.getElementById("d-backdrop").src = movie.backdrop;
  document.getElementById("d-type").textContent = movie.type;
  document.getElementById("d-title").textContent = movie.title;
  document.getElementById("d-match").textContent = movie.match + " relevante";
  document.getElementById("d-age").textContent = movie.age;
  document.getElementById("d-year").textContent = movie.year;
  document.getElementById("d-dur").textContent = movie.duration;
  document.getElementById("d-desc").textContent = movie.description;
  document.getElementById("d-rating").textContent = "★ " + movie.rating;
  document.getElementById("d-stars").textContent = stars(movie.rating);
  document.getElementById("d-genres").textContent = movie.genres.join(" / ");
  document.getElementById("d-year2").textContent = movie.year;
  document.getElementById("d-dur2").textContent = movie.duration;
  document.getElementById("d-actors").textContent = (movie.actors || []).join(", ");
  document.getElementById("d-tags").innerHTML = (movie.tags || []).map(t => `<span class="meta-tag">${t}</span>`).join("");
  closePlayer();
  actualizarBtnLista(movie.id);

  // Episodios
  const epsSection = document.getElementById("eps-section");
  const epsList = document.getElementById("eps-list");
  epsList.innerHTML = "";
  if (movie.type === "Serie" && movie.episodios && movie.episodios.length > 0) {
    epsSection.style.display = "block";
    const temporadas = {};
    movie.episodios.forEach(ep => {
      if (!temporadas[ep.temporada]) temporadas[ep.temporada] = [];
      temporadas[ep.temporada].push(ep);
    });
    const tempNums = Object.keys(temporadas).sort((a,b) => a-b);
    const tabsWrap = document.createElement("div");
    tabsWrap.className = "temp-tabs";
    const epsGrid = document.createElement("div");
    epsGrid.id = "eps-grid";
    function renderEps(t) {
      epsGrid.innerHTML = "";
      temporadas[t].forEach(ep => {
        const item = document.createElement("div");
        item.className = "ep-item";
        item.innerHTML = `
          <div class="ep-num">${ep.episodio}</div>
          <div class="ep-info">
            <p class="ep-titulo">${ep.titulo}</p>
            <p class="ep-sub">T${ep.temporada} · Ep. ${ep.episodio}</p>
          </div>
          <div class="ep-play"><svg viewBox="0 0 24 24" fill="white" width="12" height="12"><path d="M8 5v14l11-7z"/></svg></div>`;
        item.addEventListener("click", () => {
          epsGrid.querySelectorAll(".ep-item").forEach(i => i.classList.remove("playing"));
          item.classList.add("playing");
          marcarContinuar(movie);
          document.getElementById("player-frame").src = ep.streamUrl;
          const wrap = document.getElementById("player-wrap");
          wrap.style.display = "block";
          wrap.scrollIntoView({ behavior: "smooth", block: "start" });
        });
        epsGrid.appendChild(item);
      });
    }
    tempNums.forEach((t, i) => {
      const tab = document.createElement("button");
      tab.className = "temp-tab" + (i === 0 ? " active" : "");
      tab.textContent = tempNums.length === 1 ? "Episodios" : `Temporada ${t}`;
      tab.addEventListener("click", () => {
        tabsWrap.querySelectorAll(".temp-tab").forEach(b => b.classList.remove("active"));
        tab.classList.add("active");
        renderEps(t);
      });
      tabsWrap.appendChild(tab);
    });
    renderEps(tempNums[0]);
    epsList.appendChild(tabsWrap);
    epsList.appendChild(epsGrid);
  } else {
    epsSection.style.display = "none";
  }

  const simGrid = document.getElementById("similar-grid");
  simGrid.innerHTML = "";
  movies.filter(m => m.id !== movie.id && m.genres.some(g => movie.genres.includes(g))).slice(0, 6).forEach(m => simGrid.appendChild(createSimCard(m)));
  window.scrollTo(0, 0);
}

function playMovie() {
  if (!currentMovie) return;
  marcarContinuar(currentMovie);
  const wrap = document.getElementById("player-wrap");
  document.getElementById("player-frame").src = currentMovie.streamUrl;
  wrap.style.display = "block";
  wrap.scrollIntoView({ behavior: "smooth", block: "start" });
}

function closePlayer() {
  document.getElementById("player-wrap").style.display = "none";
  document.getElementById("player-frame").src = "";
}

function showCatalog() {
  document.getElementById("catalog-view").style.display = "block";
  document.getElementById("detail-view").style.display = "none";
  closePlayer();
  currentMovie = null;
  renderCatalog();
  window.scrollTo(0, 0);
}

// ── HERO ──────────────────────────────────────────────────────
function getFeatured() {
  if (!movies.length) return null;
  const top = [...movies].sort((a, b) => b.rating - a.rating).slice(0, 5);
  const dayIndex = Math.floor(Date.now() / (1000 * 60 * 60 * 24 * 2));
  return top[dayIndex % top.length];
}

function renderHero(movie) {
  if (!movie) return;
  document.getElementById("hero-img").src = movie.backdrop;
  document.getElementById("hero-title").textContent = movie.title;
  document.getElementById("hero-match").textContent = movie.match + " relevante";
  document.getElementById("hero-badge").textContent = movie.age;
  document.getElementById("hero-dur").textContent = movie.duration + " · " + movie.genres[0];
  document.getElementById("hero-desc").textContent = movie.description;
  document.getElementById("hero-info-btn").onclick = () => {
    window.open(window.location.pathname + "?id=" + movie.id, "_blank");
  };
  document.getElementById("hero-lista-btn").onclick = () => {
    toggleLista(movie);
    document.getElementById("hero-lista-btn").innerHTML = estaEnLista(movie.id)
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg> ✓ En mi lista`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg> Mi lista`;
  };
}

// ── FILTROS ───────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".menu-item").forEach(i => i.classList.remove("active"));
  const fbtn = document.querySelector(`.fbtn[data-filter="${f}"]`);
  const mitem = document.querySelector(`.menu-item[data-filter="${f}"]`);
  if (fbtn) fbtn.classList.add("active");
  if (mitem) mitem.classList.add("active");
  document.getElementById("catalog-view").style.display = "block";
  document.getElementById("detail-view").style.display = "none";
  closePlayer();
  currentMovie = null;
  renderCatalog();
  window.scrollTo(0, 0);
}

document.querySelectorAll(".fbtn").forEach(btn => btn.addEventListener("click", () => setFilter(btn.dataset.filter)));
document.querySelectorAll(".menu-item").forEach(item => {
  item.addEventListener("click", () => { setFilter(item.dataset.filter); closeMenu(); });
});

// ── MENÚ MÓVIL ────────────────────────────────────────────────
function openMenu() { document.getElementById("menu-panel").classList.add("open"); document.getElementById("menu-overlay").classList.add("open"); }
function closeMenu() { document.getElementById("menu-panel").classList.remove("open"); document.getElementById("menu-overlay").classList.remove("open"); }
document.getElementById("menu-btn").addEventListener("click", openMenu);
document.getElementById("menu-close").addEventListener("click", closeMenu);
document.getElementById("menu-overlay").addEventListener("click", closeMenu);

// ── LOGO / BACK ───────────────────────────────────────────────
document.getElementById("logo-btn").addEventListener("click", () => setFilter("all"));
document.getElementById("back-btn").addEventListener("click", showCatalog);
document.getElementById("btn-play-detail").addEventListener("click", playMovie);
document.getElementById("player-close-btn").addEventListener("click", closePlayer);
document.getElementById("btn-mi-lista").addEventListener("click", () => { if (currentMovie) toggleLista(currentMovie); });

// ── BÚSQUEDA ──────────────────────────────────────────────────
const searchInput = document.getElementById("search-input");
const searchPreview = document.getElementById("search-preview");
const previewList = document.getElementById("preview-list");

searchInput.addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { searchPreview.classList.remove("visible"); return; }
  const results = movies.filter(m =>
    m.title.toLowerCase().includes(q) ||
    (m.genres || []).some(g => g.toLowerCase().includes(q)) ||
    (m.actors || []).some(a => a.toLowerCase().includes(q))
  ).slice(0, 5);
  previewList.innerHTML = "";
  if (!results.length) {
    previewList.innerHTML = `<div class="preview-empty">Sin resultados</div>`;
  } else {
    results.forEach(m => {
      const item = document.createElement("div");
      item.className = "preview-item";
      item.innerHTML = `
        <img src="${m.poster}" onerror="this.src='https://via.placeholder.com/36x54/111/444?text=?'"/>
        <div class="preview-item-info">
          <p class="preview-item-title">${m.title}</p>
          <p class="preview-item-sub">${m.year} · ${m.type}</p>
        </div>
        <span class="preview-item-rating">★ ${m.rating}</span>`;
      item.addEventListener("click", () => {
        window.open(window.location.pathname + "?id=" + m.id, "_blank");
        searchPreview.classList.remove("visible");
        searchInput.value = "";
      });
      previewList.appendChild(item);
    });
  }
  searchPreview.classList.add("visible");
});

document.addEventListener("click", e => {
  if (!e.target.closest(".search-wrap")) searchPreview.classList.remove("visible");
});

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  await loadData();
  renderCatalog();
  renderHero(getFeatured());
  if (urlMovieId) {
    const m = movies.find(m => m.id === urlMovieId);
    if (m) openDetail(m);
  }
}

init();
</script>
</body>
</html>
